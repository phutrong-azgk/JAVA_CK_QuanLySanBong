<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="~{layout :: layout(~{::section})}">
<head>
    <title>Quản lý Khách Hàng</title>
</head>
<body>
<section>
    <div class="page-header mb-4">
        <div class="d-flex justify-content-between align-items-center">
            <h2 class="page-title"><i class="fas fa-users me-2"></i>Quản lý Khách Hàng</h2>
            <button class="btn btn-primary shadow-sm" onclick="showAddCustomerModal()">
                <i class="fas fa-user-plus me-1"></i> Thêm khách hàng
            </button>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-secondary">
                    <tr>
                        <th class="ps-4">Mã KH</th>
                        <th>Tên Khách Hàng</th>
                        <th>Liên Hệ</th>
                        <th>Tài Khoản Liên Kết</th>
                        <th>Số Lần</th>
                        <th>Tổng Chi Tiêu</th>
                        <th class="text-end pe-4">Thao Tác</th>
                    </tr>
                    </thead>
                    <tbody id="customersTableBody">
                    <tr><td colspan="7" class="text-center py-4">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="customerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Thêm Khách Hàng Mới</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="customerForm">
                        <input type="hidden" id="maKhach" name="maKhach" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên Khách Hàng</label>
                            <input type="text" class="form-control" id="tenKhach" name="tenKhach" placeholder="Nhập tên khách hàng" />
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Số Điện Thoại</label>
                                <input type="tel" class="form-control" id="soDienThoai" name="soDienThoai" placeholder="SĐT liên hệ" maxlength="15" />
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Tài Khoản (Username) <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="taiKhoan" name="taiKhoan" required placeholder="Tên tài khoản"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="email" name="email" placeholder="Email liên hệ" />
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" class="btn btn-primary px-4" onclick="saveCustomer()">Lưu thông tin</button>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        let customers = [];
        let editingCustomer = null;

        $(document).ready(function () {
            loadCustomers();
        });

        function loadCustomers() {
            $.get('/khach/api/get-all', function (data) {
                customers = data;
                renderCustomers();
            });
        }

        function renderCustomers() {
            const tbody = $('#customersTableBody');
            tbody.empty();

            if(customers.length === 0) {
                tbody.html('<tr><td colspan="7" class="text-center py-4 text-muted">Chưa có dữ liệu khách hàng.</td></tr>');
                return;
            }

            customers.forEach(cust => {
                const tongChi = new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(cust.tongChi || 0);
                const contactInfo = `
                    <div><i class="fas fa-phone text-muted me-1" style="font-size: 12px;"></i> ${cust.soDienThoai || '<span class="text-muted">Trống</span>'}</div>
                    <div style="font-size: 12px;"><i class="fas fa-envelope text-muted me-1"></i> ${cust.email || '<span class="text-muted">Trống</span>'}</div>
                `;
                const taiKhoanInfo = cust.taiKhoan ? `<span class="badge bg-info text-dark border"><i class="fas fa-user me-1"></i>${cust.taiKhoan}</span>` : '<span class="text-muted">Khách lẻ</span>';

                const row = `
                    <tr>
                        <td class="ps-4 text-muted fw-bold">#${cust.maKhach}</td>
                        <td class="fw-bold text-dark">${cust.tenKhach}</td>
                        <td>${contactInfo}</td>
                        <td>${taiKhoanInfo}</td>
                        <td><span class="badge bg-secondary rounded-pill px-2">${cust.soHoaDon || 0}</span></td>
                        <td class="text-success fw-bold">${tongChi}</td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-warning me-1" onclick='editCustomer(${JSON.stringify(cust)})' title="Sửa">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteCustomer(${cust.maKhach})" title="Xóa">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        function showAddCustomerModal() {
            editingCustomer = null;
            $('#modalTitle').text('Thêm Khách Hàng Mới');
            $('#customerForm')[0].reset();
            $('#maKhach').val('');
            $('#customerModal').modal('show');
        }

        function editCustomer(cust) {
            editingCustomer = cust;
            $('#modalTitle').text('Chỉnh Sửa Khách Hàng');
            $('#maKhach').val(cust.maKhach);
            $('#tenKhach').val(cust.tenKhach);
            $('#soDienThoai').val(cust.soDienThoai || '');
            $('#email').val(cust.email || '');
            $('#taiKhoan').val(cust.taiKhoan || '');
            $('#customerModal').modal('show');
        }

        function saveCustomer() {
            const form = document.getElementById('customerForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const data = $(form).serialize();
            const url = editingCustomer ? '/khach/api/edit' : '/khach/api/create';

            $.post(url, data, function (response) {
                if (response.success) {
                    $('#customerModal').modal('hide');
                    loadCustomers();
                    alert(response.message);
                } else {
                    alert(response.message);
                }
            }).fail(function() {
                alert("Lỗi hệ thống (500): Server từ chối xử lý dữ liệu.");
            });
        }

        function deleteCustomer(id) {
            if (confirm('Bạn có chắc chắn muốn xóa khách hàng này? Tất cả hóa đơn liên quan có thể bị ảnh hưởng!')) {
                $.post('/khach/api/delete', { maKhach: id }, function (response) {
                    if (response.success) {
                        loadCustomers();
                        alert(response.message);
                    } else {
                        alert(response.message);
                    }
                }).fail(function() {
                    alert("Lỗi hệ thống! (Có thể khách hàng này đang có hóa đơn nên không thể xóa).");
                });
            }
        }
    </script>
</section>
</body>
</html>
