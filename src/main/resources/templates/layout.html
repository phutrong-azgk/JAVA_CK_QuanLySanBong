<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(content)">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sân Bóng</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f3f4f6; }
        .main-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #1f2937; color: white; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #374151; }
        .sidebar-title { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
        .sidebar-user { font-size: 14px; color: #9ca3af; }
        .sidebar-role { font-size: 12px; color: #6b7280; text-transform: capitalize; }
        .sidebar-nav { flex: 1; padding: 8px; }
        .nav-item { margin-bottom: 8px; list-style: none; padding-left: 0;}
        .nav-link { display: flex; align-items: center; padding: 12px 16px; color: #d1d5db; text-decoration: none; border-radius: 8px; transition: all 0.3s; }
        .nav-link:hover { background: #374151; color: white; }
        .nav-link.active { background: #2563eb; color: white; }
        .nav-link i { width: 20px; margin-right: 12px; }
        .sidebar-footer { padding: 10px; border-top: 1px solid #374151; }
        .main-content { flex: 1; margin-left: 260px; padding: 0; }
        .content-wrapper { padding: 24px; }
        .page-header { margin-bottom: 24px; }
        .page-title { font-size: 28px; font-weight: bold; color: #1f2937; margin: 0; }
        .btn-logout { width: 100%; display: flex; align-items: center; justify-content: center; padding: 8px; background: transparent; color: #d1d5db; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .btn-logout:hover { background: #dc3545; color: white; }
        .btn-logout i { margin-right: 8px; }
    </style>
</head>
<body>
<div class="main-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title"><i class="fas fa-futbol me-2"></i>Sân Bóng</h2>
            <div sec:authorize="isAuthenticated()">
                <p class="sidebar-user" sec:authentication="name">Tên đăng nhập</p>
                <p class="sidebar-role" sec:authentication="principal.authorities">Role</p>
            </div>
        </div>

        <nav class="sidebar-nav">
            <ul class="nav flex-column p-0">
                <li class="nav-item" sec:authorize="hasRole('KHACH')">
                    <a href="/profile" class="nav-link">
                        <i class="nav-icon fas fa-user-circle"></i>
                        <span>Hồ sơ của tôi</span>
                    </a>
                </li>
                <li class="nav-item"> <a th:href="@{/san}" class="nav-link">
                    <i class="fas fa-layer-group"></i> <span>Quản lý sân bóng</span>
                </a>
                </li>
                <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                    <a th:href="@{/order}" class="nav-link">
                        <i class="fas fa-shopping-cart"></i> <span>Gọi đồ & Dịch vụ</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                    <a th:href="@{/kho}" class="nav-link">
                        <i class="fas fa-box"></i> <span>Quản lý kho</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                    <a th:href="@{/taikhoan}" class="nav-link">
                        <i class="fas fa-user-shield"></i> <span>Quản lý tài khoản</span>
                    </a>
                </li>
                <li sec:authorize="hasRole('ADMIN')" class="nav-item">
                    <a th:href="@{/khach}" class="nav-link">
                        <i class="fas fa-user-shield"></i> <span>Quản lý khách hàng</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer" sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span>Đăng xuất</span>
                </button>
            </form>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-wrapper">
            <div th:replace="${content}"></div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function () {
        var path = window.location.pathname;
        $('.nav-link').each(function () {
            if ($(this).attr('href') === path) {
                $(this).addClass('active');
            }
        });
    });
</script>
</body>
</html>
