<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<head><title>Hồ sơ của tôi</title></head>
<body>
<section>
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-user-circle me-2"></i> Hồ sơ cá nhân</h4>
                </div>
                <div class="card-body p-4">
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="fw-bold">Tên đăng nhập</label>
                            <input type="text" class="form-control bg-light" th:value="${username}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Email</label>
                            <input type="email" class="form-control" name="email" th:value="${email}">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Họ và Tên <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="tenKhach" th:value="${tenKhach}" required >
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Số điện thoại</label>
                            <input type="text" class="form-control" name="soDienThoai" th:value="${soDienThoai}">
                        </div>
                        <hr>
                        <div class="mb-3">
                            <label class="fw-bold text-danger">Đổi mật khẩu mới (Bỏ trống nếu không đổi)</label>
                            <input type="password" class="form-control" name="password" placeholder="Nhập mật khẩu mới">
                        </div>
                        <button type="button" class="btn btn-success w-100" onclick="updateProfile()">Lưu Thay Đổi</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateProfile() {
            const data = $('#profileForm').serialize();
            $.post('/profile/api/update', data, function(res) {
                alert(res.message);
                if(res.success) location.reload();
            });
        }
    </script>
</section>
</body>
</html>
