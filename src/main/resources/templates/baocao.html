<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<head>
    <title>Báo cáo thống kê</title>
</head>
<body>
<section>
    <div class="page-header mb-4">
        <h2 class="page-title"><i class="fas fa-chart-bar me-2"></i>Báo cáo thống kê</h2>
    </div>

    <div class="card mb-4 shadow-sm border-0">
        <div class="card-body row">
            <div class="col-md-3">
                <label class="fw-bold">Từ ngày</label>
                <input type="date" class="form-control" id="startDate" />
            </div>
            <div class="col-md-3">
                <label class="fw-bold">Đến ngày</label>
                <input type="date" class="form-control" id="endDate" />
            </div>
            <div class="col-md-3 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="loadRevenue()"><i class="fas fa-search"></i> Lọc dữ liệu</button>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-success text-white shadow-sm border-0">
                <div class="card-body d-flex align-items-center">
                    <div class="display-4 me-3"><i class="fas fa-dollar-sign"></i></div>
                    <div>
                        <h6>Tổng doanh thu</h6>
                        <h3 class="fw-bold mb-0" id="totalRevenue">0 đ</h3>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-info text-white shadow-sm border-0">
                <div class="card-body d-flex align-items-center">
                    <div class="display-4 me-3"><i class="fas fa-receipt"></i></div>
                    <div>
                        <h6>Số hóa đơn</h6>
                        <h3 class="fw-bold mb-0" id="totalBills">0</h3>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-primary text-white shadow-sm border-0">
                <div class="card-body d-flex align-items-center">
                    <div class="display-4 me-3"><i class="fas fa-chart-line"></i></div>
                    <div>
                        <h6>Trung bình/hóa đơn</h6>
                        <h3 class="fw-bold mb-0" id="averageBill">0 đ</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white"><h5 class="mb-0 fw-bold">Biểu đồ doanh thu</h5></div>
        <div class="card-body">
            <canvas id="revenueChart" height="80"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        let revenueChart = null;

        $(document).ready(function () {
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            $('#startDate').val(firstDay.toISOString().split('T')[0]);
            $('#endDate').val(today.toISOString().split('T')[0]);
            loadRevenue();
        });

        function loadRevenue() {
            // Lấy giá trị ngày từ ô input
            const startDate = $('#startDate').val();
            const endDate = $('#endDate').val();

            // Gửi kèm startDate và endDate xuống Controller
            $.get('/baocao/api/doanh-thu', { startDate: startDate, endDate: endDate }, function (data) {
                $('#totalRevenue').text(formatCurrency(data.totalRevenue));
                $('#totalBills').text(data.totalBills);
                $('#averageBill').text(formatCurrency(data.averageBill));

                // Vẽ biểu đồ
                renderRevenueChart(data.dailyRevenue);
            });
        }
        function renderRevenueChart(data) {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            if (revenueChart) revenueChart.destroy();

            revenueChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: 'Doanh thu (VNĐ)',
                        data: data.map(d => d.revenue),
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: { responsive: true }
            });
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
        }
    </script>
</section>
</body>
</html>
